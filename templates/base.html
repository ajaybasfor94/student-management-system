<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <!-- Bootstrap 5 Latest CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons Latest -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>
<body class="bg-light">

<!-- Responsive Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-mortarboard-fill"></i> SMS
        </a>

        <!-- Mobile toggle button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navMenu">
            <div class="ms-auto">
                <a class="btn btn-light me-2 mb-2 mb-lg-0" href="/">
                    <i class="bi bi-house"></i> Home
                </a>
                <a class="btn btn-light me-2 mb-2 mb-lg-0" href="/add">
                    <i class="bi bi-person-plus"></i> Add Student
                </a>
                <a class="btn btn-light" href="/students">
                    <i class="bi bi-people"></i> Students
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- Content -->
<div class="container py-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS (for mobile menu) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
